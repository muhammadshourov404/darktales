<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DarkTales — গল্প</title>
<link rel="stylesheet" href="assets/css/main.css">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="assets/js/firebase-config.js"></script>
<script src="assets/js/auth-guard.js"></script>
<script src="assets/js/nav.js"></script>
</head>
<body>
<div id="loading-screen" class="loading-screen">
  <div class="logo-text">DarkTales</div>
  <div class="spinner spinner-lg"></div>
</div>
<div class="read-progress"><div class="read-progress-fill" id="read-progress"></div></div>
<div class="app-shell">
  <main class="app-main" id="story-container">
    <div style="text-align:center;padding:3rem;"><div class="spinner spinner-lg" style="margin:0 auto;"></div></div>
  </main>
</div>

<!-- Report Modal -->
<div class="modal-overlay" id="report-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">রিপোর্ট করুন</span>
      <button class="btn-icon" onclick="closeModal('report-modal')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="form-group">
      <label class="form-label">কারণ</label>
      <select class="form-input form-select" id="report-reason">
        <option value="inappropriate">অনুপযুক্ত বিষয়বস্তু</option>
        <option value="spam">স্প্যাম</option>
        <option value="fake">মিথ্যা তথ্য</option>
        <option value="harassment">হয়রানি</option>
        <option value="other">অন্যান্য</option>
      </select>
    </div>
    <button class="btn btn-primary w-full" onclick="submitReport()">রিপোর্ট পাঠান</button>
  </div>
</div>

<!-- Rate Modal -->
<div class="modal-overlay" id="rate-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">গল্পটি রেট করুন</span>
      <button class="btn-icon" onclick="closeModal('rate-modal')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div style="text-align:center;padding:1rem 0;">
      <div class="stars" id="rate-stars" style="justify-content:center;gap:8px;">
        <svg class="star" style="width:32px;height:32px;" data-val="1" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" onclick="setRating(1)" onmouseover="hoverRating(1)" onmouseleave="hoverRating(0)"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        <svg class="star" style="width:32px;height:32px;" data-val="2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" onclick="setRating(2)" onmouseover="hoverRating(2)" onmouseleave="hoverRating(0)"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        <svg class="star" style="width:32px;height:32px;" data-val="3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" onclick="setRating(3)" onmouseover="hoverRating(3)" onmouseleave="hoverRating(0)"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        <svg class="star" style="width:32px;height:32px;" data-val="4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" onclick="setRating(4)" onmouseover="hoverRating(4)" onmouseleave="hoverRating(0)"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        <svg class="star" style="width:32px;height:32px;" data-val="5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" onclick="setRating(5)" onmouseover="hoverRating(5)" onmouseleave="hoverRating(0)"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      </div>
      <p style="font-size:13px;color:var(--text-3);margin-top:12px;" id="rating-label">তারা ক্লিক করুন</p>
    </div>
    <button class="btn btn-primary w-full" id="rate-submit-btn" onclick="submitRating()" disabled>রেটিং দিন</button>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>

<script>
let storyId = null;
let storyData = null;
let selectedRating = 0;
let hasRated = false;
let hasLiked = false;

requireAuth((user, userData) => {
  buildNav('');
  const params = new URLSearchParams(window.location.search);
  storyId = params.get('id');
  if (!storyId) { window.location.href = 'feed.html'; return; }
  loadStory();
  setupReadProgress();
});

async function loadStory() {
  const doc = await db.collection('stories').doc(storyId).get();
  if (!doc.exists) {
    document.getElementById('story-container').innerHTML = `<div class="empty-state"><h3>গল্পটি পাওয়া যায়নি</h3><a href="feed.html" class="btn btn-ghost btn-sm mt-2">ফিডে ফিরুন</a></div>`;
    return;
  }
  storyData = { id: doc.id, ...doc.data() };
  if (storyData.hidden && storyData.authorId !== currentUser?.uid) {
    document.getElementById('story-container').innerHTML = `<div class="empty-state"><h3>গল্পটি লুকানো হয়েছে</h3></div>`;
    return;
  }
  renderStory();
  incrementView();
  checkUserInteractions();
  loadComments();
}

async function incrementView() {
  await db.collection('stories').doc(storyId).update({
    views: firebase.firestore.FieldValue.increment(1)
  });
}

async function checkUserInteractions() {
  if (!currentUser) return;
  const likeDoc = await db.collection('stories').doc(storyId).collection('likes').doc(currentUser.uid).get();
  hasLiked = likeDoc.exists;
  if (hasLiked) {
    document.getElementById('like-btn')?.classList.add('liked');
  }
  const rateDoc = await db.collection('stories').doc(storyId).collection('ratings').doc(currentUser.uid).get();
  hasRated = rateDoc.exists;
  if (hasRated && document.getElementById('rate-btn')) {
    document.getElementById('rate-btn').textContent = 'রেটিং দেওয়া হয়েছে';
    selectedRating = rateDoc.data().rating;
  }
  const bmDoc = await db.collection('bookmarks').doc(`${currentUser.uid}_${storyId}`).get();
  if (bmDoc.exists) document.getElementById('bm-btn')?.classList.add('bookmarked');
}

function renderStory() {
  const s = storyData;
  const avgRating = s.ratingCount > 0 ? (s.ratingSum / s.ratingCount).toFixed(1) : 0;
  const isOwner = currentUser?.uid === s.authorId;
  const cat = getCategoryInfo(s.category);

  document.title = `${s.title} — DarkTales`;
  document.getElementById('story-container').innerHTML = `
    <div style="margin-bottom:1rem;">
      <a href="feed.html" style="display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--text-3);">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        ফিডে ফিরুন
      </a>
    </div>

    <article>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1rem;align-items:center;">
        <span class="category-badge ${cat.class}">${sanitizeText(cat.label)}</span>
        ${s.language === 'en' ? '<span class="lang-badge">EN</span>' : '<span class="lang-badge">বাংলা</span>'}
        ${s.featured ? '<span class="featured-badge">★ ফিচার্ড</span>' : ''}
        ${s.isAnonymous ? '<span class="anon-badge">নাম গোপন</span>' : ''}
      </div>

      <h1 class="story-detail-title">${sanitizeText(s.title)}</h1>

      <div style="display:flex;align-items:center;gap:12px;margin-bottom:1.5rem;flex-wrap:wrap;">
        ${renderAvatar(s.isAnonymous ? 'অজানা' : s.authorName, 'md')}
        <div>
          <div style="font-size:14px;font-weight:500;color:var(--text-1);cursor:pointer;" onclick="${!s.isAnonymous ? `goToProfile('${s.authorId}')` : ''}">
            ${sanitizeText(s.isAnonymous ? 'অজানা লেখক' : s.authorName)}
          </div>
          <div style="font-size:12px;color:var(--text-3);">${timeAgo(s.createdAt)} · ${s.readingTime || 1} মিনিট পড়া · ${fmtNum(s.views || 0)} ভিউ</div>
        </div>
        ${!s.isAnonymous && !isOwner ? `<button class="btn btn-ghost btn-sm" style="margin-left:auto;" onclick="followAuthor('${s.authorId}')" id="follow-btn">ফলো করুন</button>` : ''}
        ${isOwner ? `<div style="margin-left:auto;display:flex;gap:6px;">
          <a href="write.html?edit=${s.id}" class="btn btn-ghost btn-sm">সম্পাদনা</a>
          <button class="btn btn-ghost btn-sm" style="color:var(--red);" onclick="deleteStory()">মুছুন</button>
        </div>` : ''}
      </div>

      <div class="card mb-2" style="border-left:3px solid var(--red);border-radius:0 var(--radius-lg) var(--radius-lg) 0;">
        <div class="card-body story-detail-body" id="story-body-text">${sanitizeText(s.body)}</div>
      </div>

      <!-- Actions -->
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:1.5rem;">
        <button class="btn btn-ghost btn-sm ${hasLiked?'liked':''}" id="like-btn" onclick="toggleLike()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="${hasLiked?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          <span id="like-count">${fmtNum(s.likesCount || 0)}</span> লাইক
        </button>
        <button class="btn btn-ghost btn-sm" id="bm-btn" onclick="toggleBookmark()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m19 21-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/></svg>
          বুকমার্ক
        </button>
        <button class="btn btn-ghost btn-sm" onclick="shareStory()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
          শেয়ার
        </button>
        <button class="btn btn-ghost btn-sm" id="rate-btn" onclick="document.getElementById('rate-modal').classList.add('open')">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          ${hasRated ? `রেটিং দেওয়া হয়েছে` : 'রেটিং দিন'}
        </button>
        ${avgRating > 0 ? `<div style="display:flex;align-items:center;gap:4px;">${renderStars(avgRating,'star-sm')}<span style="font-size:13px;color:var(--gold);">${avgRating} (${s.ratingCount})</span></div>` : ''}
        <button class="btn btn-ghost btn-sm" style="margin-left:auto;color:var(--text-3);" onclick="document.getElementById('report-modal').classList.add('open')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>
          রিপোর্ট
        </button>
      </div>
    </article>

    <!-- Comments -->
    <div>
      <h3 style="font-family:var(--font-heading);margin-bottom:1rem;">মন্তব্য (<span id="comment-count">${s.commentsCount || 0}</span>)</h3>
      <div class="card mb-2">
        <div class="card-body">
          <textarea class="form-input form-textarea" id="comment-input" placeholder="আপনার মন্তব্য লিখুন..." rows="3" maxlength="1000"></textarea>
          <div style="text-align:right;margin-top:8px;">
            <button class="btn btn-primary btn-sm" onclick="postComment()">মন্তব্য করুন</button>
          </div>
        </div>
      </div>
      <div id="comments-list"></div>
    </div>`;
}

async function loadComments() {
  const snap = await db.collection('stories').doc(storyId).collection('comments')
    .orderBy('createdAt', 'desc').limit(50).get();
  const list = document.getElementById('comments-list');
  if (!list) return;
  if (snap.empty) {
    list.innerHTML = '<div class="empty-state" style="padding:2rem 0;"><p>এখনো কোনো মন্তব্য নেই। প্রথম মন্তব্য করুন!</p></div>';
    return;
  }
  list.innerHTML = snap.docs.map(doc => {
    const c = { id: doc.id, ...doc.data() };
    const isOwner = currentUser?.uid === c.authorId;
    return `<div class="comment-item" id="comment-${c.id}">
      ${renderAvatar(c.authorName, 'sm')}
      <div class="comment-body">
        <div class="comment-header">
          <span class="comment-author" style="cursor:pointer;" onclick="goToProfile('${c.authorId}')">${sanitizeText(c.authorName)}</span>
          <span class="comment-time">${timeAgo(c.createdAt)}</span>
        </div>
        <div class="comment-text">${sanitizeText(c.body)}</div>
        <div class="comment-actions">
          ${isOwner ? `<button class="story-action-btn" onclick="deleteComment('${c.id}')" style="color:var(--red);font-size:12px;">মুছুন</button>` : ''}
          <button class="story-action-btn" onclick="reportComment('${c.id}')" style="font-size:12px;color:var(--text-3);">রিপোর্ট</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

async function postComment() {
  const body = document.getElementById('comment-input').value.trim();
  if (!body || body.length < 2) { showToast('মন্তব্য লিখুন', 'error'); return; }
  if (!storyData) return;
  try {
    await db.collection('stories').doc(storyId).collection('comments').add({
      authorId: currentUser.uid,
      authorName: currentUserData?.displayName || 'Anonymous',
      authorUsername: currentUserData?.username || '',
      body,
      reported: false,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    await db.collection('stories').doc(storyId).update({
      commentsCount: firebase.firestore.FieldValue.increment(1)
    });
    await awardXP(currentUser.uid, XP_RULES.POST_COMMENT, 'post_comment');
    if (storyData.authorId !== currentUser.uid) {
      await awardXP(storyData.authorId, XP_RULES.RECEIVE_COMMENT, 'receive_comment');
      await sendNotification(storyData.authorId, 'comment',
        { uid: currentUser.uid, displayName: currentUserData?.displayName, username: currentUserData?.username },
        { storyId, storyTitle: storyData.title });
    }
    document.getElementById('comment-input').value = '';
    loadComments();
    const countEl = document.getElementById('comment-count');
    if (countEl) countEl.textContent = (storyData.commentsCount || 0) + 1;
    showToast('মন্তব্য পোস্ট হয়েছে! +1 XP', 'success');
  } catch (e) {
    showToast('মন্তব্য করতে সমস্যা হয়েছে', 'error');
  }
}

async function deleteComment(commentId) {
  if (!confirm('মন্তব্যটি মুছবেন?')) return;
  await db.collection('stories').doc(storyId).collection('comments').doc(commentId).delete();
  await db.collection('stories').doc(storyId).update({ commentsCount: firebase.firestore.FieldValue.increment(-1) });
  loadComments();
}

async function reportComment(commentId) {
  await db.collection('reports').add({
    reporterId: currentUser.uid,
    targetType: 'comment',
    targetId: commentId,
    storyId,
    reason: 'inappropriate',
    status: 'pending',
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  });
  showToast('রিপোর্ট পাঠানো হয়েছে', 'success');
}

async function toggleLike() {
  if (!currentUser) return;
  const likeRef = db.collection('stories').doc(storyId).collection('likes').doc(currentUser.uid);
  const btn = document.getElementById('like-btn');
  const countEl = document.getElementById('like-count');
  if (hasLiked) {
    await likeRef.delete();
    await db.collection('stories').doc(storyId).update({ likesCount: firebase.firestore.FieldValue.increment(-1) });
    hasLiked = false;
    btn.classList.remove('liked');
    btn.querySelector('svg').setAttribute('fill','none');
    storyData.likesCount = (storyData.likesCount || 1) - 1;
  } else {
    await likeRef.set({ uid: currentUser.uid, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
    await db.collection('stories').doc(storyId).update({ likesCount: firebase.firestore.FieldValue.increment(1) });
    hasLiked = true;
    btn.classList.add('liked');
    btn.querySelector('svg').setAttribute('fill','currentColor');
    storyData.likesCount = (storyData.likesCount || 0) + 1;
    if (storyData.authorId !== currentUser.uid) {
      await awardXP(storyData.authorId, XP_RULES.RECEIVE_LIKE, 'receive_like');
      await sendNotification(storyData.authorId, 'like',
        { uid: currentUser.uid, displayName: currentUserData?.displayName, username: currentUserData?.username },
        { storyId, storyTitle: storyData.title });
    }
  }
  if (countEl) countEl.textContent = fmtNum(storyData.likesCount);
}

async function toggleBookmark() {
  const bmRef = db.collection('bookmarks').doc(`${currentUser.uid}_${storyId}`);
  const bmDoc = await bmRef.get();
  const btn = document.getElementById('bm-btn');
  if (bmDoc.exists) {
    await bmRef.delete();
    btn.classList.remove('bookmarked');
    showToast('বুকমার্ক সরানো হয়েছে', 'info');
  } else {
    await bmRef.set({ userId: currentUser.uid, storyId, storyTitle: storyData.title, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
    btn.classList.add('bookmarked');
    showToast('বুকমার্ক করা হয়েছে', 'success');
  }
}

function shareStory() {
  const url = window.location.href;
  if (navigator.share) {
    navigator.share({ title: storyData.title, url });
  } else {
    navigator.clipboard.writeText(url).then(() => showToast('লিংক কপি হয়েছে!', 'success'));
  }
}

function hoverRating(val) {
  document.querySelectorAll('#rate-stars .star').forEach((s, i) => {
    if (val > 0) {
      s.classList.toggle('hover', i < val);
      s.setAttribute('fill', i < val ? 'currentColor' : 'none');
    } else {
      s.classList.remove('hover');
      s.setAttribute('fill', i < selectedRating ? 'currentColor' : 'none');
    }
  });
}

function setRating(val) {
  selectedRating = val;
  document.querySelectorAll('#rate-stars .star').forEach((s, i) => {
    s.setAttribute('fill', i < val ? 'currentColor' : 'none');
  });
  const labels = ['', 'হতাশাজনক', 'গড়পড়তা', 'ভালো', 'দারুণ', 'অসাধারণ'];
  document.getElementById('rating-label').textContent = labels[val] || '';
  document.getElementById('rate-submit-btn').disabled = false;
}

async function submitRating() {
  if (!selectedRating || hasRated) return;
  const rateRef = db.collection('stories').doc(storyId).collection('ratings').doc(currentUser.uid);
  await rateRef.set({ uid: currentUser.uid, rating: selectedRating, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
  await db.collection('stories').doc(storyId).update({
    ratingSum: firebase.firestore.FieldValue.increment(selectedRating),
    ratingCount: firebase.firestore.FieldValue.increment(1)
  });
  if (storyData.authorId !== currentUser.uid) {
    const xpAmount = selectedRating === 5 ? XP_RULES.RECEIVE_5STAR : XP_RULES.RECEIVE_RATING;
    await awardXP(storyData.authorId, xpAmount, 'receive_rating');
    await sendNotification(storyData.authorId, 'rating',
      { uid: currentUser.uid, displayName: currentUserData?.displayName, username: currentUserData?.username },
      { storyId, storyTitle: storyData.title });
  }
  hasRated = true;
  closeModal('rate-modal');
  showToast('রেটিং দেওয়া হয়েছে!', 'success');
  document.getElementById('rate-btn').innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" style="color:var(--gold)"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg> রেটিং দেওয়া হয়েছে`;
}

async function submitReport() {
  await db.collection('reports').add({
    reporterId: currentUser.uid,
    targetType: 'story',
    targetId: storyId,
    reason: document.getElementById('report-reason').value,
    status: 'pending',
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  });
  closeModal('report-modal');
  showToast('রিপোর্ট পাঠানো হয়েছে। ধন্যবাদ।', 'success');
}

async function deleteStory() {
  if (!confirm('গল্পটি চিরতরে মুছে ফেলবেন?')) return;
  await db.collection('stories').doc(storyId).delete();
  await db.collection('users').doc(currentUser.uid).update({ storiesCount: firebase.firestore.FieldValue.increment(-1) });
  showToast('গল্প মুছে ফেলা হয়েছে', 'success');
  setTimeout(() => { window.location.href = 'feed.html'; }, 1000);
}

async function followAuthor(authorId) {
  const followId = `${currentUser.uid}_${authorId}`;
  const followRef = db.collection('follows').doc(followId);
  const btn = document.getElementById('follow-btn');
  const doc = await followRef.get();
  if (doc.exists) {
    await followRef.delete();
    await db.collection('users').doc(authorId).update({ followersCount: firebase.firestore.FieldValue.increment(-1) });
    await db.collection('users').doc(currentUser.uid).update({ followingCount: firebase.firestore.FieldValue.increment(-1) });
    btn.textContent = 'ফলো করুন';
  } else {
    await followRef.set({ followerId: currentUser.uid, followingId: authorId, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
    await db.collection('users').doc(authorId).update({ followersCount: firebase.firestore.FieldValue.increment(1) });
    await db.collection('users').doc(currentUser.uid).update({ followingCount: firebase.firestore.FieldValue.increment(1) });
    await awardXP(authorId, XP_RULES.RECEIVE_FOLLOWER, 'receive_follower');
    await sendNotification(authorId, 'follow',
      { uid: currentUser.uid, displayName: currentUserData?.displayName, username: currentUserData?.username }, {});
    btn.textContent = 'আনফলো';
  }
}

function goToProfile(uid) {
  window.location.href = `profile.html?uid=${uid}`;
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

function setupReadProgress() {
  window.addEventListener('scroll', () => {
    const article = document.querySelector('article');
    if (!article) return;
    const rect = article.getBoundingClientRect();
    const totalH = article.offsetHeight;
    const scrolled = -rect.top;
    const pct = Math.min(100, Math.max(0, (scrolled / totalH) * 100));
    document.getElementById('read-progress').style.width = pct + '%';
  });
}
</script>
