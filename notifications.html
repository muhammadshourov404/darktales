<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DarkTales — নোটিফিকেশন</title>
<link rel="stylesheet" href="assets/css/main.css">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="assets/js/firebase-config.js"></script>
<script src="assets/js/auth-guard.js"></script>
<script src="assets/js/nav.js"></script>
</head>
<body>
<div id="loading-screen" class="loading-screen">
  <div class="logo-text">DarkTales</div>
  <div class="spinner spinner-lg"></div>
</div>
<div class="app-shell">
  <main class="app-main">
    <div class="section-header mb-2">
      <h2 class="page-title">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        নোটিফিকেশন
      </h2>
      <button class="btn btn-ghost btn-sm" onclick="markAllRead()">সব পড়া হয়েছে</button>
    </div>
    <div class="card">
      <div id="notif-list">
        <div style="text-align:center;padding:2rem;"><div class="spinner spinner-lg" style="margin:0 auto;"></div></div>
      </div>
    </div>
  </main>
</div>
<div id="toast-container" class="toast-container"></div>

<script>
requireAuth((user, userData) => {
  buildNav('notifications');
  loadNotifications();
});

async function loadNotifications() {
  const snap = await db.collection('notifications')
    .where('userId', '==', currentUser.uid)
    .orderBy('createdAt', 'desc')
    .limit(50)
    .get();

  const list = document.getElementById('notif-list');

  if (snap.empty) {
    list.innerHTML = `<div class="empty-state" style="padding:3rem 1rem;">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      <h3>কোনো নোটিফিকেশন নেই</h3>
      <p>নতুন কার্যক্রমের বিজ্ঞপ্তি এখানে দেখাবে।</p>
    </div>`;
    return;
  }

  const icons = {
    like:    `<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" stroke="none" style="color:var(--red)"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`,
    comment: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--info)"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>`,
    follow:  `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--success)"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>`,
    rating:  `<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" stroke="none" style="color:var(--gold)"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`
  };

  const messages = {
    like:    (n) => `<strong>${sanitizeText(n.fromUserName)}</strong> আপনার গল্পে লাইক দিয়েছেন`,
    comment: (n) => `<strong>${sanitizeText(n.fromUserName)}</strong> আপনার গল্পে মন্তব্য করেছেন`,
    follow:  (n) => `<strong>${sanitizeText(n.fromUserName)}</strong> আপনাকে ফলো করেছেন`,
    rating:  (n) => `<strong>${sanitizeText(n.fromUserName)}</strong> আপনার গল্পে রেটিং দিয়েছেন`
  };

  list.innerHTML = snap.docs.map(doc => {
    const n = { id: doc.id, ...doc.data() };
    const icon = icons[n.type] || icons.like;
    const msg = messages[n.type] ? messages[n.type](n) : 'নতুন বিজ্ঞপ্তি';
    const storyLink = n.storyId ? `onclick="window.location.href='story.html?id=${n.storyId}'"` : '';
    const hasLink = n.storyId || n.type === 'follow';
    return `<div class="notif-item ${n.read ? '' : 'unread'}" style="${hasLink ? 'cursor:pointer;' : ''}"
      onclick="${n.storyId ? `window.location.href='story.html?id=${n.storyId}'` : n.type === 'follow' ? `window.location.href='profile.html?uid=${n.fromUserId}'` : ''}">
      <div style="width:36px;height:36px;border-radius:50%;background:var(--bg-2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
        ${icon}
      </div>
      <div class="notif-text">
        ${msg}
        ${n.storyTitle ? `<span style="display:block;font-size:12px;color:var(--text-3);margin-top:2px;">"${sanitizeText(n.storyTitle)}"</span>` : ''}
      </div>
      <div class="notif-time">${timeAgo(n.createdAt)}</div>
    </div>`;
  }).join('');

  // Mark all as read
  const unreadDocs = snap.docs.filter(d => !d.data().read);
  if (unreadDocs.length > 0) {
    const batch = db.batch();
    unreadDocs.forEach(d => batch.update(d.ref, { read: true }));
    await batch.commit();
  }
}

async function markAllRead() {
  const snap = await db.collection('notifications')
    .where('userId', '==', currentUser.uid)
    .where('read', '==', false)
    .get();
  if (snap.empty) { showToast('সব নোটিফিকেশন পড়া হয়েছে', 'info'); return; }
  const batch = db.batch();
  snap.docs.forEach(d => batch.update(d.ref, { read: true }));
  await batch.commit();
  showToast('সব পড়া হিসেবে চিহ্নিত করা হয়েছে', 'success');
  loadNotifications();
}
</script>
</body>
</html>
