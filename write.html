<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DarkTales — গল্প লিখুন</title>
<link rel="stylesheet" href="assets/css/main.css">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="assets/js/firebase-config.js"></script>
<script src="assets/js/auth-guard.js"></script>
<script src="assets/js/nav.js"></script>
<style>
.write-container { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
.write-options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 1rem 1.25rem; border-top: 1px solid var(--border); }
.write-footer { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.25rem; border-top: 1px solid var(--border); flex-wrap: wrap; gap: 10px; }
.anon-lock { display: flex; align-items: center; gap: 6px; font-size: 12.5px; color: var(--text-3); cursor: pointer; }
.anon-lock svg { color: var(--gold); }
</style>
</head>
<body>
<div id="loading-screen" class="loading-screen">
  <div class="logo-text">DarkTales</div>
  <div class="spinner spinner-lg"></div>
</div>
<div class="app-shell">
  <main class="app-main">
    <div class="section-header mb-2">
      <h2 class="page-title">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        গল্প লিখুন
      </h2>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-ghost btn-sm" onclick="saveDraft()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          ড্রাফট
        </button>
        <button class="btn btn-primary btn-sm" onclick="publishStory()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          প্রকাশ করুন
        </button>
      </div>
    </div>

    <div class="write-container">
      <input class="story-title-input" type="text" id="story-title" placeholder="আপনার গল্পের শিরোনাম..." maxlength="150">
      <div class="write-toolbar">
        <button class="toolbar-btn" onclick="insertText('**','**')">B</button>
        <button class="toolbar-btn" onclick="insertText('_','_')"><em>I</em></button>
        <button class="toolbar-btn" onclick="insertNewLine()">¶</button>
        <button class="toolbar-btn" onclick="insertText('— ','')">—</button>
        <button class="toolbar-btn" onclick="insertText('"','"')">""</button>
        <span class="char-counter" id="char-counter">0 / 15000</span>
      </div>
      <textarea class="story-textarea" id="story-body" placeholder="আপনার ভয়ের গল্পটি এখানে লিখুন...&#10;&#10;সেই রাতটার কথা মনে আছে? যখন মনে হয়েছিলো পেছনে কেউ আছে..." maxlength="15000" oninput="updateCounter()"></textarea>
    </div>

    <div class="write-options">
      <div class="form-group" style="margin-bottom:0;">
        <label class="form-label">ক্যাটাগরি</label>
        <select class="form-input form-select" id="story-category">
          <option value="ghost">ভুতুড়ে অভিজ্ঞতা</option>
          <option value="dark">রাতের আঁধার</option>
          <option value="real">বাস্তব ভয়</option>
          <option value="super">অতিপ্রাকৃত</option>
          <option value="challenge">চ্যালেঞ্জিং মুহূর্ত</option>
          <option value="mystery">অজানা রহস্য</option>
        </select>
      </div>
      <div class="form-group" style="margin-bottom:0;">
        <label class="form-label">ভাষা</label>
        <select class="form-input form-select" id="story-language">
          <option value="bn">বাংলা</option>
          <option value="en">English</option>
        </select>
      </div>
    </div>

    <div class="write-footer">
      <div>
        <label class="anon-lock" id="anon-toggle" onclick="toggleAnon()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="anon-icon"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <span id="anon-label">নাম গোপন রেখে পোস্ট করুন</span>
          <span id="anon-xp" style="font-size:11px;color:var(--gold);"></span>
        </label>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-ghost btn-sm" onclick="window.history.back()">বাতিল</button>
        <button class="btn btn-primary" onclick="publishStory()" id="publish-btn">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          প্রকাশ করুন
        </button>
      </div>
    </div>
  </main>
</div>
<div id="toast-container" class="toast-container"></div>

<script>
let isAnonymous = false;
let anonUnlocked = false;
let editStoryId = null;

requireAuth((user, userData) => {
  buildNav('write');
  anonUnlocked = (userData?.xp || 0) >= 1000;
  if (!anonUnlocked) {
    document.getElementById('anon-xp').textContent = '(1000 XP দরকার)';
  }
  // Check if editing
  const params = new URLSearchParams(window.location.search);
  editStoryId = params.get('edit');
  if (editStoryId) loadDraft(editStoryId);
});

function updateCounter() {
  const body = document.getElementById('story-body').value;
  const counter = document.getElementById('char-counter');
  const len = body.length;
  counter.textContent = `${len} / 15000`;
  counter.className = 'char-counter' + (len > 14000 ? ' over' : len > 12000 ? ' warn' : '');
}

function insertText(before, after) {
  const ta = document.getElementById('story-body');
  const start = ta.selectionStart;
  const end = ta.selectionEnd;
  const selected = ta.value.substring(start, end);
  const replacement = before + selected + after;
  ta.value = ta.value.substring(0, start) + replacement + ta.value.substring(end);
  ta.focus();
  ta.selectionStart = start + before.length;
  ta.selectionEnd = start + before.length + selected.length;
  updateCounter();
}

function insertNewLine() {
  const ta = document.getElementById('story-body');
  const pos = ta.selectionStart;
  ta.value = ta.value.substring(0, pos) + '\n\n' + ta.value.substring(pos);
  ta.selectionStart = ta.selectionEnd = pos + 2;
  ta.focus();
  updateCounter();
}

function toggleAnon() {
  if (!anonUnlocked) { showToast('Anonymous পোস্টের জন্য ১০০০ XP দরকার', 'error'); return; }
  isAnonymous = !isAnonymous;
  const icon = document.getElementById('anon-icon');
  const label = document.getElementById('anon-label');
  if (isAnonymous) {
    icon.innerHTML = `<rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 5-5 5 5 0 0 1 5 5v4"/>`;
    label.textContent = 'নাম গোপন থাকবে';
    label.style.color = 'var(--gold)';
  } else {
    label.textContent = 'নাম গোপন রেখে পোস্ট করুন';
    label.style.color = '';
  }
}

async function publishStory() {
  const title = document.getElementById('story-title').value.trim();
  const body = document.getElementById('story-body').value.trim();
  const category = document.getElementById('story-category').value;
  const language = document.getElementById('story-language').value;
  if (!title) { showToast('শিরোনাম দিন', 'error'); return; }
  if (body.length < 100) { showToast('গল্পটি কমপক্ষে ১০০ অক্ষর হতে হবে', 'error'); return; }
  const btn = document.getElementById('publish-btn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner" style="width:16px;height:16px;"></div>';
  try {
    const storyData = {
      title,
      body,
      category,
      language,
      authorId: currentUser.uid,
      authorName: isAnonymous ? 'অজানা' : (currentUserData?.displayName || 'Anonymous'),
      authorUsername: isAnonymous ? '' : (currentUserData?.username || ''),
      isAnonymous,
      isDraft: false,
      hidden: false,
      featured: false,
      likesCount: 0,
      commentsCount: 0,
      ratingSum: 0,
      ratingCount: 0,
      views: 0,
      readingTime: calcReadingTime(body),
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    };
    if (editStoryId) {
      await db.collection('stories').doc(editStoryId).update({ ...storyData });
      showToast('গল্প আপডেট হয়েছে!', 'success');
    } else {
      const docRef = await db.collection('stories').add(storyData);
      await db.collection('users').doc(currentUser.uid).update({
        storiesCount: firebase.firestore.FieldValue.increment(1)
      });
      await awardXP(currentUser.uid, XP_RULES.POST_STORY, 'post_story');
      showToast('গল্প প্রকাশিত হয়েছে! +10 XP', 'success');
      setTimeout(() => { window.location.href = `story.html?id=${docRef.id}`; }, 1200);
      return;
    }
    setTimeout(() => { window.location.href = `story.html?id=${editStoryId}`; }, 1200);
  } catch (e) {
    showToast('প্রকাশ করতে সমস্যা হয়েছে: ' + e.message, 'error');
    btn.disabled = false;
    btn.innerHTML = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg> প্রকাশ করুন';
  }
}

async function saveDraft() {
  const title = document.getElementById('story-title').value.trim();
  const body = document.getElementById('story-body').value.trim();
  if (!title && !body) { showToast('কিছু লিখুন আগে', 'error'); return; }
  try {
    const draftData = {
      title: title || '(শিরোনামহীন)',
      body,
      category: document.getElementById('story-category').value,
      language: document.getElementById('story-language').value,
      authorId: currentUser.uid,
      authorName: currentUserData?.displayName || 'Anonymous',
      authorUsername: currentUserData?.username || '',
      isAnonymous: false,
      isDraft: true,
      hidden: false,
      featured: false,
      likesCount: 0,
      commentsCount: 0,
      ratingSum: 0,
      ratingCount: 0,
      views: 0,
      readingTime: calcReadingTime(body || ' '),
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    };
    if (editStoryId) {
      await db.collection('stories').doc(editStoryId).update(draftData);
    } else {
      await db.collection('stories').add(draftData);
    }
    showToast('ড্রাফট সেভ হয়েছে', 'success');
  } catch (e) {
    showToast('ড্রাফট সেভ করতে সমস্যা হয়েছে', 'error');
  }
}

async function loadDraft(id) {
  const doc = await db.collection('stories').doc(id).get();
  if (!doc.exists) return;
  const data = doc.data();
  if (data.authorId !== currentUser.uid) return;
  document.getElementById('story-title').value = data.title || '';
  document.getElementById('story-body').value = data.body || '';
  document.getElementById('story-category').value = data.category || 'ghost';
  document.getElementById('story-language').value = data.language || 'bn';
  updateCounter();
}
</script>
</body>
</html>
