<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DarkTales — অন্বেষণ</title>
<link rel="stylesheet" href="assets/css/main.css">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="assets/js/firebase-config.js"></script>
<script src="assets/js/auth-guard.js"></script>
<script src="assets/js/nav.js"></script>
</head>
<body>
<div id="loading-screen" class="loading-screen">
  <div class="logo-text">DarkTales</div>
  <div class="spinner spinner-lg"></div>
</div>
<div class="app-shell">
  <main class="app-main">
    <div class="section-header mb-2">
      <h2 class="page-title">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        অন্বেষণ
      </h2>
    </div>

    <!-- Search Box -->
    <div style="position:relative;margin-bottom:1.25rem;">
      <svg style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-3);pointer-events:none;" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="form-input" type="text" id="search-input" placeholder="গল্পের শিরোনাম বা লেখক খুঁজুন..." style="padding-left:42px;" oninput="onSearchInput()" onkeydown="if(event.key==='Enter')doSearch()">
    </div>

    <!-- Search Type Tabs -->
    <div class="tabs" id="search-tabs">
      <button class="tab-btn active" data-type="stories" onclick="switchSearchType(this,'stories')">গল্প</button>
      <button class="tab-btn" data-type="users" onclick="switchSearchType(this,'users')">লেখক</button>
    </div>

    <!-- Category Filter -->
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.25rem;" id="explore-cats">
      <button class="tag-pill active" data-cat="" onclick="filterCat(this,'')">সব</button>
      <button class="tag-pill" data-cat="ghost" onclick="filterCat(this,'ghost')">ভুতুড়ে</button>
      <button class="tag-pill" data-cat="dark" onclick="filterCat(this,'dark')">রাতের আঁধার</button>
      <button class="tag-pill" data-cat="real" onclick="filterCat(this,'real')">বাস্তব ভয়</button>
      <button class="tag-pill" data-cat="super" onclick="filterCat(this,'super')">অতিপ্রাকৃত</button>
      <button class="tag-pill" data-cat="challenge" onclick="filterCat(this,'challenge')">চ্যালেঞ্জ</button>
      <button class="tag-pill" data-cat="mystery" onclick="filterCat(this,'mystery')">রহস্য</button>
    </div>

    <!-- Sort -->
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:1rem;" id="sort-row">
      <span style="font-size:12px;color:var(--text-3);">সাজান:</span>
      <button class="tag-pill active" data-sort="newest" onclick="setSort(this,'newest')">নতুন</button>
      <button class="tag-pill" data-sort="popular" onclick="setSort(this,'popular')">জনপ্রিয়</button>
      <button class="tag-pill" data-sort="rated" onclick="setSort(this,'rated')">সেরা রেটিং</button>
    </div>

    <div id="results-container"></div>
    <div id="explore-loading" style="text-align:center;padding:2rem;display:none;"><div class="spinner spinner-lg" style="margin:0 auto;"></div></div>
    <div id="load-more-wrap" style="text-align:center;padding:1rem 0;display:none;">
      <button class="btn btn-ghost" onclick="loadMore()">আরো দেখুন</button>
    </div>
  </main>
</div>
<div id="toast-container" class="toast-container"></div>

<script>
let searchType = 'stories';
let currentCat = '';
let currentSort = 'newest';
let lastDoc = null;
let searchTimeout = null;
let currentQuery = '';

requireAuth((user, userData) => {
  buildNav('explore');
  const params = new URLSearchParams(window.location.search);
  const q = params.get('q');
  if (q) {
    document.getElementById('search-input').value = q;
    currentQuery = q;
  }
  loadResults(true);
});

function onSearchInput() {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => {
    currentQuery = document.getElementById('search-input').value.trim();
    lastDoc = null;
    loadResults(true);
  }, 400);
}

function doSearch() {
  currentQuery = document.getElementById('search-input').value.trim();
  lastDoc = null;
  loadResults(true);
}

function switchSearchType(btn, type) {
  document.querySelectorAll('#search-tabs .tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  searchType = type;
  const catRow = document.getElementById('explore-cats');
  const sortRow = document.getElementById('sort-row');
  catRow.style.display = type === 'users' ? 'none' : 'flex';
  sortRow.style.display = type === 'users' ? 'none' : 'flex';
  lastDoc = null;
  loadResults(true);
}

function filterCat(btn, cat) {
  document.querySelectorAll('#explore-cats .tag-pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentCat = cat;
  lastDoc = null;
  loadResults(true);
}

function setSort(btn, sort) {
  document.querySelectorAll('[data-sort]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentSort = sort;
  lastDoc = null;
  loadResults(true);
}

async function loadResults(reset = false) {
  if (reset) {
    document.getElementById('results-container').innerHTML = '';
    lastDoc = null;
  }
  document.getElementById('explore-loading').style.display = 'block';
  document.getElementById('load-more-wrap').style.display = 'none';

  try {
    if (searchType === 'users') {
      await loadUsers(reset);
    } else {
      await loadStories(reset);
    }
  } catch (e) {
    showToast('লোড করতে সমস্যা হয়েছে', 'error');
  }
  document.getElementById('explore-loading').style.display = 'none';
}

async function loadStories(reset) {
  let query = db.collection('stories')
    .where('isDraft', '==', false)
    .where('hidden', '==', false);

  if (currentCat) query = query.where('category', '==', currentCat);

  if (currentSort === 'popular') {
    query = query.orderBy('likesCount', 'desc');
  } else if (currentSort === 'rated') {
    query = query.orderBy('ratingSum', 'desc');
  } else {
    query = query.orderBy('createdAt', 'desc');
  }

  if (lastDoc) query = query.startAfter(lastDoc);
  query = query.limit(12);

  const snap = await query.get();
  let docs = snap.docs;

  if (currentQuery) {
    const q = currentQuery.toLowerCase();
    docs = docs.filter(d => {
      const data = d.data();
      return (data.title || '').toLowerCase().includes(q) ||
             (data.authorName || '').toLowerCase().includes(q);
    });
  }

  const container = document.getElementById('results-container');
  if (reset && docs.length === 0) {
    container.innerHTML = `<div class="empty-state">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <h3>কোনো ফলাফল নেই</h3>
      <p>অন্য কিওয়ার্ড দিয়ে চেষ্টা করুন।</p>
    </div>`;
    return;
  }

  docs.forEach(doc => {
    const s = { id: doc.id, ...doc.data() };
    const cat = getCategoryInfo(s.category);
    const avgRating = s.ratingCount > 0 ? (s.ratingSum / s.ratingCount).toFixed(1) : 0;
    container.insertAdjacentHTML('beforeend', `
      <div class="story-card mb-2" onclick="window.location.href='story.html?id=${s.id}'">
        <div class="story-card-meta">
          <div class="story-card-author">
            ${renderAvatar(s.isAnonymous ? 'অজানা' : s.authorName, 'sm')}
            <span class="story-card-author-name" onclick="event.stopPropagation();window.location.href='profile.html?uid=${s.authorId}'">${sanitizeText(s.isAnonymous ? 'অজানা লেখক' : s.authorName)}</span>
          </div>
          <span class="story-card-date">${timeAgo(s.createdAt)}</span>
        </div>
        <div class="story-card-title">${sanitizeText(s.title)}</div>
        <div class="story-card-body">${sanitizeText(s.body)}</div>
        <div class="story-card-footer">
          <span class="category-badge ${cat.class}">${sanitizeText(cat.label)}</span>
          ${avgRating > 0 ? `<span style="font-size:12px;color:var(--gold);">★ ${avgRating}</span>` : ''}
          <div class="story-card-actions">
            <span class="story-action-btn">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
              ${fmtNum(s.likesCount || 0)}
            </span>
            <span class="story-action-btn">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
              ${fmtNum(s.commentsCount || 0)}
            </span>
          </div>
        </div>
      </div>`);
  });

  if (snap.docs.length > 0) lastDoc = snap.docs[snap.docs.length - 1];
  document.getElementById('load-more-wrap').style.display = snap.docs.length === 12 ? 'block' : 'none';
}

async function loadUsers(reset) {
  let query = db.collection('users').where('banned', '==', false).orderBy('xp', 'desc').limit(20);
  if (lastDoc) query = query.startAfter(lastDoc);
  const snap = await query.get();
  let docs = snap.docs;

  if (currentQuery) {
    const q = currentQuery.toLowerCase();
    docs = docs.filter(d => {
      const data = d.data();
      return (data.displayName || '').toLowerCase().includes(q) ||
             (data.username || '').toLowerCase().includes(q);
    });
  }

  const container = document.getElementById('results-container');
  if (reset && docs.length === 0) {
    container.innerHTML = `<div class="empty-state"><h3>কোনো লেখক পাওয়া যায়নি</h3></div>`;
    return;
  }

  docs.forEach(doc => {
    const u = doc.data();
    container.insertAdjacentHTML('beforeend', `
      <div class="user-row" style="cursor:pointer;padding:14px 0;" onclick="window.location.href='profile.html?uid=${doc.id}'">
        ${renderAvatar(u.displayName, 'md')}
        <div class="user-row-info">
          <div class="user-row-name">
            ${sanitizeText(u.displayName)}
            ${u.verified ? `<svg class="verified-icon" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>` : ''}
          </div>
          <div class="user-row-username">@${sanitizeText(u.username || 'unknown')}</div>
          <div class="user-row-meta">${fmtNum(u.storiesCount || 0)} গল্প · ${fmtNum(u.followersCount || 0)} ফলোয়ার</div>
        </div>
        ${renderLevelBadge(u.xp || 0)}
      </div>`);
  });

  if (snap.docs.length > 0) lastDoc = snap.docs[snap.docs.length - 1];
  document.getElementById('load-more-wrap').style.display = snap.docs.length === 20 ? 'block' : 'none';
}

function loadMore() { loadResults(false); }
</script>
</body>
</html>
