<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DarkTales — লিডারবোর্ড</title>
<link rel="stylesheet" href="assets/css/main.css">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="assets/js/firebase-config.js"></script>
<script src="assets/js/auth-guard.js"></script>
<script src="assets/js/nav.js"></script>
</head>
<body>
<div id="loading-screen" class="loading-screen">
  <div class="logo-text">DarkTales</div>
  <div class="spinner spinner-lg"></div>
</div>
<div class="app-shell">
  <main class="app-main">
    <div class="section-header mb-2">
      <h2 class="page-title">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
        লিডারবোর্ড
      </h2>
    </div>

    <div class="tabs mb-2">
      <button class="tab-btn active" onclick="switchLbTab(this,'xp')">XP র‍্যাংকিং</button>
      <button class="tab-btn" onclick="switchLbTab(this,'stories')">সর্বোচ্চ গল্প</button>
      <button class="tab-btn" onclick="switchLbTab(this,'followers')">সর্বোচ্চ ফলোয়ার</button>
    </div>

    <!-- My Rank -->
    <div id="my-rank-box" class="card mb-2" style="display:none;">
      <div class="card-body" style="display:flex;align-items:center;gap:12px;">
        <div style="font-size:1rem;color:var(--text-3);font-family:var(--font-heading);width:28px;text-align:center;" id="my-rank-num">—</div>
        <div style="flex:1;">
          <div style="font-size:13px;font-weight:500;color:var(--text-2);">আপনার র‍্যাংক</div>
        </div>
        <div style="font-family:var(--font-heading);font-size:1rem;color:var(--gold);" id="my-rank-val">0 XP</div>
      </div>
    </div>

    <div id="lb-list">
      <div style="text-align:center;padding:2rem;"><div class="spinner spinner-lg" style="margin:0 auto;"></div></div>
    </div>
  </main>
</div>
<div id="toast-container" class="toast-container"></div>

<script>
let currentLbTab = 'xp';

requireAuth((user, userData) => {
  buildNav('leaderboard');
  loadLeaderboard();
});

function switchLbTab(btn, tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentLbTab = tab;
  loadLeaderboard();
}

async function loadLeaderboard() {
  const list = document.getElementById('lb-list');
  list.innerHTML = '<div style="text-align:center;padding:2rem;"><div class="spinner spinner-lg" style="margin:0 auto;"></div></div>';

  let field = 'xp';
  let label = 'XP';
  if (currentLbTab === 'stories') { field = 'storiesCount'; label = 'গল্প'; }
  if (currentLbTab === 'followers') { field = 'followersCount'; label = 'ফলোয়ার'; }

  const snap = await db.collection('users')
    .where('banned', '==', false)
    .orderBy(field, 'desc')
    .limit(50)
    .get();

  if (snap.empty) {
    list.innerHTML = '<div class="empty-state"><h3>কোনো তথ্য নেই</h3></div>';
    return;
  }

  // Find my rank
  let myRank = -1;
  let myVal = 0;
  snap.docs.forEach((doc, i) => {
    if (doc.id === currentUser.uid) {
      myRank = i + 1;
      myVal = doc.data()[field] || 0;
    }
  });

  const myBox = document.getElementById('my-rank-box');
  if (myRank > 0) {
    document.getElementById('my-rank-num').textContent = '#' + myRank;
    document.getElementById('my-rank-val').textContent = fmtNum(myVal) + ' ' + label;
    myBox.style.display = 'block';
  }

  const rankClasses = ['', 'top-1', 'top-2', 'top-3'];
  const rankColors = ['', 'gold', 'silver', 'bronze'];
  const medals = ['', '★', '②', '③'];

  list.innerHTML = snap.docs.map((doc, i) => {
    const u = doc.data();
    const rank = i + 1;
    const isMe = doc.id === currentUser.uid;
    const rankClass = rank <= 3 ? rankClasses[rank] : '';
    const rankColor = rank <= 3 ? rankColors[rank] : '';
    const val = u[field] || 0;
    return `<div class="lb-row ${rankClass}" style="${isMe ? 'border-color:var(--border-accent);' : ''}" onclick="window.location.href='profile.html?uid=${doc.id}'" style="cursor:pointer;">
      <div class="lb-rank ${rankColor}">${rank <= 3 ? medals[rank] : rank}</div>
      ${renderAvatar(u.displayName, 'sm')}
      <div class="lb-info">
        <div class="lb-name">
          ${sanitizeText(u.displayName)}
          ${u.verified ? `<svg class="verified-icon" width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>` : ''}
          ${isMe ? '<span style="font-size:10px;color:var(--text-3);">(আপনি)</span>' : ''}
        </div>
        <div class="lb-meta">@${sanitizeText(u.username || 'unknown')} · ${renderLevelBadge(u.xp || 0).replace('<span', '<span style="font-size:10px;"')}</div>
      </div>
      <div class="lb-xp">${fmtNum(val)} <span style="font-size:12px;color:var(--text-3);">${label}</span></div>
    </div>`;
  }).join('');
}
</script>
</body>
</html>
