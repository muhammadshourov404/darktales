<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DarkTales — বুকমার্ক</title>
<link rel="stylesheet" href="assets/css/main.css">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="assets/js/firebase-config.js"></script>
<script src="assets/js/auth-guard.js"></script>
<script src="assets/js/nav.js"></script>
</head>
<body>
<div id="loading-screen" class="loading-screen">
  <div class="logo-text">DarkTales</div>
  <div class="spinner spinner-lg"></div>
</div>
<div class="app-shell">
  <main class="app-main">
    <div class="section-header mb-2">
      <h2 class="page-title">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m19 21-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/></svg>
        বুকমার্ক
      </h2>
    </div>
    <div id="bookmarks-list">
      <div style="text-align:center;padding:2rem;"><div class="spinner spinner-lg" style="margin:0 auto;"></div></div>
    </div>
  </main>
</div>
<div id="toast-container" class="toast-container"></div>

<script>
requireAuth((user, userData) => {
  buildNav('bookmarks');
  loadBookmarks();
});

async function loadBookmarks() {
  const snap = await db.collection('bookmarks')
    .where('userId', '==', currentUser.uid)
    .orderBy('createdAt', 'desc')
    .limit(50)
    .get();

  const list = document.getElementById('bookmarks-list');

  if (snap.empty) {
    list.innerHTML = `<div class="empty-state">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="m19 21-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/></svg>
      <h3>কোনো বুকমার্ক নেই</h3>
      <p>পছন্দের গল্পে বুকমার্ক আইকন ক্লিক করুন।</p>
      <a href="feed.html" class="btn btn-primary btn-sm mt-2">গল্প পড়তে যান</a>
    </div>`;
    return;
  }

  const storyIds = snap.docs.map(d => d.data().storyId);
  const storySnaps = await Promise.all(storyIds.map(id => db.collection('stories').doc(id).get()));

  list.innerHTML = '';
  storySnaps.forEach((storyDoc, i) => {
    const bmId = snap.docs[i].id;
    if (!storyDoc.exists) return;
    const s = { id: storyDoc.id, ...storyDoc.data() };
    const cat = getCategoryInfo(s.category);
    list.insertAdjacentHTML('beforeend', `
      <div class="story-card mb-2" style="position:relative;">
        <button onclick="removeBookmark('${bmId}',this)" style="position:absolute;top:12px;right:12px;padding:5px;border-radius:var(--radius-md);background:transparent;border:none;cursor:pointer;color:var(--text-3);" title="বুকমার্ক সরান">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" style="color:var(--gold);"><path d="m19 21-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/></svg>
        </button>
        <div onclick="window.location.href='story.html?id=${s.id}'" style="cursor:pointer;">
          <div class="story-card-meta">
            <div class="story-card-author">
              ${renderAvatar(s.isAnonymous ? 'অজানা' : s.authorName, 'sm')}
              <span class="story-card-author-name">${sanitizeText(s.isAnonymous ? 'অজানা লেখক' : s.authorName)}</span>
            </div>
            <span class="story-card-date">${timeAgo(s.createdAt)}</span>
          </div>
          <div class="story-card-title">${sanitizeText(s.title)}</div>
          <div class="story-card-body">${sanitizeText(s.body)}</div>
          <div class="story-card-footer">
            <span class="category-badge ${cat.class}">${sanitizeText(cat.label)}</span>
            <span style="font-size:12px;color:var(--text-3);margin-left:auto;">${s.readingTime || 1} মিনিট</span>
          </div>
        </div>
      </div>`);
  });
}

async function removeBookmark(bmId, btn) {
  await db.collection('bookmarks').doc(bmId).delete();
  btn.closest('.story-card').remove();
  showToast('বুকমার্ক সরানো হয়েছে', 'info');
  const remaining = document.querySelectorAll('.story-card');
  if (remaining.length === 0) {
    document.getElementById('bookmarks-list').innerHTML = `<div class="empty-state">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="m19 21-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/></svg>
      <h3>কোনো বুকমার্ক নেই</h3>
    </div>`;
  }
}
</script>
</body>
</html>
